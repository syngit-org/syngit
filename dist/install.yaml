      namespace: syngit
      path: /syngit-v1beta4-remoteuser-managed
  failurePolicy: Fail
  name: mremoteusers-managed.v1beta4.syngit.io
  reinvocationPolicy: Never
  rules:
  - apiGroups:
    - syngit.io
    apiVersions:
    - v1beta4
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - remoteusers
  sideEffects: None
