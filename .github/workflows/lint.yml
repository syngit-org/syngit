name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint the code
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'

      - name: Run linter
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 #v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m
