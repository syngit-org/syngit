# Minimal Flux HelmRelease CRD for envtest. The syngit FluxHelmRelease provider
# only needs the apiserver to serve helm.toolkit.fluxcd.io/v2 HelmReleases so it
# can list an existing one as the donor for ConvertToHelmReleaseWithExisting; the
# full upstream schema is not required, so spec/status preserve unknown fields.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmreleases.helm.toolkit.fluxcd.io
spec:
  group: helm.toolkit.fluxcd.io
  names:
    kind: HelmRelease
    listKind: HelmReleaseList
    plural: helmreleases
    singular: helmrelease
  scope: Namespaced
  versions:
    - name: v2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
